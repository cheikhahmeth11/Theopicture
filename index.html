<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEOPICTURE | Photographe Événementiel</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{line-height:1.6;background:black;color:white;scroll-behavior:smooth;}
a{text-decoration:none;color:inherit;}

/* HEADER */
header{
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 50px;
  background: #111;
  position: fixed;
  top: 0;
  width: 100%;
  z-index: 1000;
}
header .logo{font-size:28px;font-weight:700;color:white;}
header nav ul{display:flex;list-style:none;gap:20px;}
header nav ul li a{color:white;text-decoration:none;font-weight:500;transition:.3s;}
header nav ul li a:hover{color:#ff9800;}

/* Hamburger */
.menu-toggle{display:none;flex-direction:column;cursor:pointer;gap:4px;}
.menu-toggle .bar{width:25px;height:3px;background-color:white;transition:all 0.3s;border-radius:2px;}

/* Responsive mobile */
@media(max-width:768px){
  .menu-toggle{display:flex;}
  nav ul{
    position:absolute;
    top:70px;
    right:0;
    background:#111;
    flex-direction:column;
    width:200px;
    padding:20px;
    gap:15px;
    border-radius:0 0 10px 10px;
    display:none;
  }
  nav ul.active{display:flex;}
  .menu-toggle.toggle .bar:nth-child(1){transform:rotate(45deg) translate(5px,5px);}
  .menu-toggle.toggle .bar:nth-child(2){opacity:0;}
  .menu-toggle.toggle .bar:nth-child(3){transform:rotate(-45deg) translate(5px,-5px);}
}

/* HERO */
.hero{
  height:100vh;background:url('image1.jpeg') center/cover no-repeat;display:flex;
  justify-content:center;align-items:center;text-align:center;color:white;position:relative;
}
.hero::after{content:"";position:absolute;inset:0;background:rgba(0,0,0,.5);}
.hero-text{position:relative;z-index:1;}
.hero-text h1{font-size:48px;margin-bottom:15px;}
.hero-text p{font-size:20px;margin-bottom:20px;}
.btn{display:inline-block;background:#ff9800;color:white;padding:12px 25px;border-radius:25px;font-weight:500;transition:.3s;border:none;cursor:pointer;}
.btn:hover{background:#e68900;transform:scale(1.05);}

/* SECTION */
section{padding:80px 20px;}
.container{max-width:1200px;margin:0 auto;text:black;text-align:center;opacity:0;transform:translateY(40px);transition:.8s;}
.subtitle{color:white;margin-bottom:30px;}

/* SERVICES */
.cards{display:flex;justify-content:center;gap:30px;flex-wrap:wrap;margin-top:40px;}
.card{background:black;padding:25px;border-radius:15px;width:280px;transition:.4s;border:2px solid #ff9800;}
.card:hover{transform:translateY(-5px) scale(1.03);box-shadow:0 10px 25px rgba(0,0,0,0.2);}
.card h3{margin-bottom:15px;color:white;}
.card p{margin-bottom:10px;color:white;}
.card .price{font-weight:700;color:#ff9800;margin-bottom:15px;}

/* RÉSERVATION */
#reservation {padding:60px 20px;background-color:#111;color:#fff;}
.reservation-form{max-width:500px;margin:0 auto;background-color:#1a1a1a;padding:25px;border-radius:15px;border:2px solid #ff9800;}
.reservation-form .form-group{margin-bottom:15px;}
.reservation-form label{display:block;font-size:14px;margin-bottom:5px;color:#ff9800;}
.reservation-form input,.reservation-form textarea,.reservation-form select{width:100%;padding:8px 12px;border-radius:8px;border:1px solid #555;background-color:#222;color:#fff;font-size:14px;outline:none;transition:border-color 0.3s;}
.reservation-form input:focus,.reservation-form textarea:focus,.reservation-form select:focus{border-color:#ff9800;}
.reservation-form button{margin-top:10px;padding:10px 22px;border:none;border-radius:50px;background-color:#ff9800;color:#fff;font-weight:500;cursor:pointer;transition:background 0.3s, transform 0.2s;}
.reservation-form button:hover{background-color:#ffc107;transform:scale(1.05);}

/* CONTACT */
#contact {padding:60px 20px;background-color:#111;color:#fff;}
.contact-grid{display:flex;flex-wrap:wrap;gap:40px;justify-content:center;}
.contact-info{flex:1 1 300px;max-width:400px;background:#111;padding:30px;border-radius:10px;color:white;}
.contact-form{flex:1 1 300px;max-width:500px;background-color:#1a1a1a;padding:25px;border-radius:15px;border:2px solid #ff9800;}
.contact-form .form-group{margin-bottom:15px;}
.contact-form label{display:block;font-size:14px;margin-bottom:5px;color:#ff9800;}
.contact-form input,.contact-form textarea{width:100%;padding:8px 12px;border-radius:8px;border:1px solid #555;background-color:#222;color:#fff;font-size:14px;outline:none;transition:border-color 0.3s;}
.contact-form input:focus,.contact-form textarea:focus{border-color:#ff9800;}
.contact-form button{margin-top:10px;padding:10px 22px;border:none;border-radius:50px;background-color:#ff9800;color:#fff;font-weight:500;cursor:pointer;transition:background 0.3s, transform 0.2s;}
.contact-form button:hover{background-color:#ffc107;transform:scale(1.05);}

/* GALLERY */
.gallery{column-count:3;column-gap:15px;margin-top:40px;}
.gallery img{width:100%;margin-bottom:15px;border-radius:10px;transition:.4s;cursor:pointer;}
.gallery img:hover{transform:scale(1.05);}

/* FOOTER */
footer{background:#111;color:white;padding:20px 0;text-align:center;margin-top:50px;}

/* ANIMATIONS */
.visible{opacity:1 !important;transform:translateY(0) !important;transition:.8s;}

/* Responsive */
@media(max-width:1024px){.cards{justify-content:center;}.contact-grid{flex-direction:column;}.gallery{column-count:2;}}
@media(max-width:768px){.hero-text h1{font-size:32px;}.hero-text p{font-size:16px;}.gallery{column-count:1;}}
</style>
</head>
<body>

<!-- HEADER -->
<header>
<h1 class="logo">TEOPICTURE</h1>

<div class="menu-toggle" id="mobile-menu">
  <span class="bar"></span>
  <span class="bar"></span>
  <span class="bar"></span>
</div>

<nav>
  <ul class="nav-list">
    <li><a href="#home">Accueil</a></li>
    <li><a href="#portfolio">Portfolio</a></li>
    <li><a href="#services">Services</a></li>
    <li><a href="#reservation">Réservation</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>
</header>

<!-- HERO -->
<section id="home" class="hero">
<div class="hero-text">
<h1>Immortalisez vos moments précieux</h1>
<p>Mariages • Anniversaires • Événements</p>
<a href="#reservation" class="btn">Réserver une séance</a>
</div>
</section>

<!-- PORTFOLIO, SERVICES, RÉSERVATION, CONTACT, FOOTER -->
<!-- (Garde ton code existant pour ces sections, inchangé) -->

<!-- SCRIPT MENU MOBILE -->
<script>
const mobileMenu = document.getElementById('mobile-menu');
const navList = document.querySelector('header nav ul');

mobileMenu.addEventListener('click', () => {
  navList.classList.toggle('active');
  mobileMenu.classList.toggle('toggle');
});

// Scroll animations
const elements = document.querySelectorAll(".container, .card, .gallery img, .hero-text");
function checkScroll(){
  const screenHeight = window.innerHeight;
  elements.forEach(el=>{
    const pos = el.getBoundingClientRect().top;
    if(pos<screenHeight-100){el.classList.add("visible");}
  });
}
window.addEventListener("scroll",checkScroll);
window.addEventListener("load",checkScroll);
</script>

</body>
</html>
